name = "service-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[durable_objects]
bindings = [{ name = "MATCHUP_POLLER", class_name = "MatchupPoller" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchupPoller"]

[[d1_databases]]
binding = "WVW_DB"
database_name = "wvw-events"
database_id = "c83a8a7e-a642-404a-b44b-e1b59d4b5999"
migrations_dir = "migrations"

# see https://developers.cloudflare.com/workers/configuration/placement/#specify-a-host-endpoint
[placement]
hostname = "api.guildwars2.com"

# Map the worker to a specific path on your main domain
[[routes]]
pattern = "api.gw2w2w.com"
custom_domain = true

[triggers]
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "EMBLEM_ENGINE_GUILD_LOOKUP"
id = "24797f12df1d4f8197edadc01d10535c"

[[r2_buckets]]
binding = "EMBLEM_ASSETS"
bucket_name = "emblem-assets-dev"

[vars]
GW2_API_BASE = "https://api.guildwars2.com/v2"
# GW2_API_KEY is a secret — set it in .dev.vars for local dev
# For production: pnpm dlx wrangler secret put GW2_API_KEY
GW2_PROXY_BASE = "https://czt-proxy.gw2w2w.com/v2"
# GW2_PROXY_SHARED_KEY is a secret — set it in .dev.vars for local dev
# For production: pnpm dlx wrangler secret put GW2_PROXY_SHARED_KEY[observability]

[observability.logs]
enabled = true
invocation_logs = true
